<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Era óbvio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container yes-container">
        <h1 class="yes-title">🎉Eu sabia que você ia dizer sim!🎉</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media1.tenor.com/m/Uhw4j2qWDFYAAAAd/we-are.gif" alt="celebrating">
        </div>

        <p class="yes-message">Com certeza sou a pessoa mais feliz do mundo agora</p>
    </div>

    <audio id="bg-music" loop>
        <source src="music/laufey - From The Start (Lyrics) - Dan Music (youtube).mp3" type="audio/mpeg">
    </audio>

    <div id="music-control">
        <button id="music-toggle" onclick="toggleMusic()">🔊</button>

    <div id="volume-popup">
        <div class="heart-icon">💘</div>
        <input type="range" id="volume-slider" min="0" max="100" value="30">
    </div>
   </div>

   <button id="theme-toggle">🌙</button>
    <script src="yes-script.js"></script>
</body>
</html>
