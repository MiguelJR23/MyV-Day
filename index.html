<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Você aceita namorar comigo?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>💕Você aceita namorar comigo?💕</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/OI-Xn-5JTcEAAAAj/peach-goma-happy-side-to-side.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Sim</button>
            <button id="no-btn" onclick="handleNoClick()">Não</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="music/laufey - From The Start (Lyrics) - Dan Music (youtube).mp3" type="audio/mpeg">
    </audio>

   <div id="music-control">
    <button id="music-toggle" onclick="toggleMusic()">🔊</button>

    <div id="volume-popup">
        <div class="heart-icon">💘</div>
        <input type="range" id="volume-slider" min="0" max="100" value="30">
    </div>
   </div>

   <button id="theme-toggle">🌙</button>
    <script src="script.js"></script>
</body>
</html>
